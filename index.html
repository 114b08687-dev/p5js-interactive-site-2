<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極光流體互動藝術</title>
    <!-- 正確引入官方 p5.js 核心庫 -->
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Landing Page -->
    <div id="landing-page">
        <div class="card">
            <h1>極光流體粒子互動</h1>
            <p>歡迎來到數位互動藝術空間，請依以下提示操作：</p>
            <ul class="instructions">
                <li>✨ <b>滑鼠移動</b>：流體粒子會跟隨並圍繞你的滑鼠。</li>
                <li>🖱️ <b>點擊滑鼠</b>：瞬間切換全畫面的極光色調。</li>
                <li>⌨️ <b>按下鍵盤任一鍵</b>：清除畫布並重置粒子。</li>
            </ul>
            <button id="start-btn">進入體驗</button>
        </div>
    </div>
    <!-- 畫布容器 -->
    <div id="canvas-container"></div>
    <script src="script.js"></script>
</body>
</html>
